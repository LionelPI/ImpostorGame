<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>L'Imposteur</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

<div id="intro" class="intro">
  <div class="intro-bg"></div>
</div>

<div class="mafia-effects">
  <span class="aura aura-left"></span>
  <span class="aura aura-right"></span>
</div>

<main class="app">

  <section id="home" class="screen active home-screen">
    <button id="playBtn" class="play-btn">▶ JOUER</button>
  </section>

  <section id="setup" class="screen panel">
    <h3>Ajouter les joueurs</h3>

    <div class="input-zone">
      <input id="playerInput" type="text" placeholder="Nom du joueur..." />
      <button id="addPlayerBtn">Ajouter</button>
    </div>

    <div id="playersList"></div>

    <button id="startBtn" class="big-btn">Commencer la partie</button>
  </section>

  <section id="reveal" class="screen panel">
    <p id="playerCount"></p>
    <h3 id="playerTurn"></h3>

    <div class="word-card">
      <p>Ton mot</p>
      <h2 id="revealContent">?</h2>
    </div>

    <div class="buttons">
      <button id="revealBtn">Voir mon mot</button>
      <button id="nextPlayerBtn">Joueur suivant</button>
    </div>
  </section>

  <section id="discussion" class="screen panel">
    <h3>Discussion</h3>
    <div class="group-icon">🕵️</div>
    <p>Discutez pour trouver l’imposteur.</p>

    <div id="timer">05:00</div>

    <button id="timerBtn">Lancer le chrono</button>
    <button id="goVoteBtn" class="big-btn">Passer au vote</button>
  </section>

  <section id="vote" class="screen panel">
    <h3>Vote</h3>
    <p>Choisissez le joueur à éliminer.</p>
    <div id="voteList"></div>
  </section>

  <section id="eliminated" class="screen panel">
    <h3>Élimination</h3>
    <div id="eliminatedContent"></div>
    <button id="continueBtn" class="big-btn">Continuer la partie</button>
  </section>

  <section id="result" class="screen panel">
    <h3>Résultat</h3>
    <div id="resultContent"></div>
    <button id="restartBtn" class="big-btn">Rejouer</button>
  </section>

</main>

<script src="js/script.js"></script>
</body>
</html>
